<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Handwriting Analysis – Upload</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap & Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

  <!-- AOS Animation Library -->
  <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #667eea, #764ba2);
      font-family: "Poppins", sans-serif;
      color: #333;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      margin: 0;
    }

    .upload-card {
      width: 100%;
      max-width: 720px;
      border: none;
      border-radius: 20px;
      background: #fff;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
      transition: all 0.4s ease;
    }

    .upload-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
    }

    .upload-card .card-body {
      padding: 50px;
    }

    .icon {
      font-size: 70px;
      animation: float 2.5s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }

    h2 {
      font-size: 2.5rem;
      font-family: "Pacifico", cursive;
      color: #4a4a4a;
    }

    p {
      font-size: 1.1rem;
      color: #555;
    }

    .btn-primary {
      background: linear-gradient(90deg, #667eea, #764ba2);
      border: none;
      font-size: 1.1rem;
      padding: 12px;
      border-radius: 12px;
      transition: 0.3s;
    }

    .btn-primary:hover {
      background: linear-gradient(90deg, #764ba2, #667eea);
      transform: scale(1.05);
    }

    #preview {
      display: none;
      width: 100%;
      max-height: 300px;
      border-radius: 15px;
      object-fit: contain;
      margin-top: 15px;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.2);
    }

    .tips {
      margin-top: 25px;
      font-size: 0.95rem;
      color: #555;
    }

    .footer {
      text-align: center;
      color: #eee;
      font-size: 0.9rem;
      margin-top: 20px;
    }
  </style>
</head>

<body>
  <div class="card upload-card shadow" data-aos="zoom-in">
    <div class="card-body text-center">
      <div class="icon mb-3">📝</div>
      <h2 class="mb-3">Child Script Analyzer</h2>
      <p class="mb-4">Upload a clear image of your handwriting sample (JPG/PNG).</p>

      {% if error %}
        <div class="alert alert-danger" role="alert">{{ error }}</div>
      {% endif %}

      <!-- Form now posts to /analyze instead of / so the GET route (/)
           always stays clean and safe to refresh. -->
      <form method="POST" action="{{ url_for('analyze') }}" enctype="multipart/form-data" class="text-start">
        <div class="mb-3">
          <label for="handwriting_file" class="form-label fw-semibold">Choose Image</label>
          <input type="file" id="handwriting_file" name="handwriting_file" accept=".jpg,.jpeg,.png" class="form-control" required>
        </div>
        <img id="preview" alt="Image preview" />
        <button type="submit" class="btn btn-primary w-100 mt-4">
          <i class="bi bi-robot"></i> Analyze Handwriting
        </button>
      </form>

      <div class="tips mt-4">
        🌟 <b>Tips:</b> Upload Scanned Handwriting Images only.
      </div>
    </div>
  </div>

  <div class="footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
  <script>
    AOS.init({ duration: 1000 });

    const input = document.getElementById("handwriting_file");
    const preview = document.getElementById("preview");
    input.addEventListener("change", () => {
      const file = input.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = e => {
          preview.src = e.target.result;
          preview.style.display = "block";
        };
        reader.readAsDataURL(file);
      } else {
        preview.style.display = "none";
      }
    });
  </script>
</body>
</html>
